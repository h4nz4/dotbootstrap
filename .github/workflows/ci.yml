name: ci

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt
      - name: Lint scripts
        run: shellcheck install.sh lib/*.sh tests/*.sh
      - name: Format check
        run: shfmt -d install.sh lib/*.sh tests/*.sh

  tests-linux-debian:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run bootstrap tests
        run: sh tests/bootstrap.test.sh
